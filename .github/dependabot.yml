version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
  - package-ecosystem: "npm"
    directories:
      - "/"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      nuxt:
        applies-to: version-updates
        patterns:
          - "nuxt"
          - "@nuxt/*"
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "patch"
          - "minor"
        exclude-patterns:
          - "@playwright/*"
          - "@types/node"
      playwright:
        applies-to: version-updates
        patterns:
          - "@playwright/*"
